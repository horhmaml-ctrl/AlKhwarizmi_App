include ':app'

def flutterRoot = System.getenv('FLUTTER_ROOT')
if (flutterRoot == null) {
    // محاولة إيجاد المسار إذا لم يكن معرفاً كمتغير بيئة
    def localProperties = new Properties()
    def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
    if (localPropertiesFile.exists()) {
        localPropertiesFile.withReader('UTF-8') { reader ->
            localProperties.load(reader)
        }
        flutterRoot = localProperties.getProperty('flutter.sdk')
    }
}

if (flutterRoot != null) {
    apply from: "$flutterRoot/packages/flutter_tools/gradle/app_plugin_loader.gradle"
}
